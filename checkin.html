<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Check-In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="card">
    <h1>Quick Check-In</h1>
    <p class="subtitle">No account needed — just for this visit</p>

    <form id="checkin-form">
      <label for="full_name">Full Name</label>
      <input type="text" id="full_name" required>

      
      <label for="phone_number">Phone Number</label>
      <input type="tel" id="phone_number" required>

      <label for="department">Department</label>
      <select id="department">
        <option>General Medicine</option>
        <option>Emergency / Urgent</option>
        <option>Pediatrics</option>
        <option>Pharmacy</option>
      </select>

      <label for="reason">Reason for Visit</label>
      <input type="text" id="reason" placeholder="e.g. Fever, Checkup">

      <button type="submit">Check In</button>
    </form>

    <p class="note">Your details are only used for this visit</p>
    <div id="error" class="result hidden"></div>
  </main>

  
  <script src="js/api.js"></script>
  <script src="js/checkin.js"></script>
</body>
</html>
