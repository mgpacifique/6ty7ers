services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: 6ty7ers_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: queue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d queue_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 6ty7ers_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/queue_db
      - SECRET_KEY=dev-secret-key-change-me
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
    depends_on:
      db:
        condition: service_healthy

  # 3. React + Vite Frontend Service
  frontend:
    build:
      context: ./6ty7ers-frontend
      dockerfile: Dockerfile
    container_name: 6ty7ers_frontend
    restart: always
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
